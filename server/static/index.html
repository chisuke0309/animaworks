<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnimaWorks — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/shared/favicon.svg">
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/layout.css?v=20260227b">
  <link rel="stylesheet" href="/styles/sidebar-nav.css?v=20260227e">
  <link rel="stylesheet" href="/styles/dashboard.css">
  <link rel="stylesheet" href="/styles/chat.css?v=20260301a">
  <link rel="stylesheet" href="/styles/tasks.css">
  <link rel="stylesheet" href="/styles/approvals.css">
  <link rel="stylesheet" href="/styles/sidebar.css">
  <link rel="stylesheet" href="/styles/activity.css">
  <link rel="stylesheet" href="/styles/pipeline.css">
  <link rel="stylesheet" href="/styles/memory.css">
  <link rel="stylesheet" href="/styles/history.css">
  <link rel="stylesheet" href="/styles/avatar.css">
  <link rel="stylesheet" href="/styles/assets.css">
  <link rel="stylesheet" href="/styles/board.css">
  <link rel="stylesheet" href="/styles/responsive.css?v=20260227h">
  <link rel="stylesheet" href="/styles/voice.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen" class="login-screen">
    <!-- Login form is rendered dynamically by login.js -->
  </div>

  <header class="app-header">
    <button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu" data-i18n-aria-label="common.aria_menu">&#x2630;</button>
    <button class="sidebar-collapse-btn" id="sidebarCollapseBtn" aria-label="Toggle sidebar" title="サイドバーを開閉">
      <svg class="sidebar-collapse-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M15 6l-6 6 6 6" />
      </svg>
    </button>
    <h1 class="app-title">AnimaWorks</h1>
    <div class="header-spacer"></div>
    <div class="user-info" id="userInfo">
      <span class="user-label" id="currentUserLabel"></span>
      <button class="btn-logout" id="logoutBtn" data-i18n="ws.logout">Log out</button>
    </div>
    <div class="system-status" id="systemStatus">
      <span class="status-dot status-idle"></span>
      <span id="systemStatusText" data-i18n="status.connecting">接続中...</span>
    </div>
  </header>

  <div class="app-shell">
    <!-- Mobile Nav Backdrop -->
    <div class="mobile-nav-backdrop" id="mobileNavBackdrop"></div>
    <!-- Left Sidebar Navigation -->
    <nav class="sidebar-nav" id="sidebarNav">
      <div class="sidebar-brand">AnimaWorks</div>
      <ul class="nav-list">
        <li><a href="#/chat" class="nav-item active" data-route="/chat">
          <span class="nav-emoji">&#x1F4AC;</span>
          <i data-lucide="message-circle" class="nav-lucide"></i>
          <span class="nav-label" data-i18n="nav.chat">Chat</span></a></li>
<li><a href="#/pipeline" class="nav-item" data-route="/pipeline">
          <span class="nav-emoji">&#x1F9F5;</span>
          <i data-lucide="workflow" class="nav-lucide"></i>
          <span class="nav-label">Pipeline</span></a></li>
<li><a href="#/approvals" class="nav-item" data-route="/approvals">
          <span class="nav-emoji">&#x2705;</span>
          <i data-lucide="check-circle" class="nav-lucide"></i>
          <span class="nav-label">Approvals</span></a></li>
        <li><a href="#/activity" class="nav-item" data-route="/activity">
          <span class="nav-emoji">&#x1F4CA;</span>
          <i data-lucide="activity" class="nav-lucide"></i>
          <span class="nav-label" data-i18n="nav.activity">Activity</span></a></li>
        <li><a href="#/users" class="nav-item" data-route="/users">
          <span class="nav-emoji">&#x1F465;</span>
          <i data-lucide="users" class="nav-lucide"></i>
          <span class="nav-label" data-i18n="nav.users">Users</span></a></li>
        <li><a href="#/animas" class="nav-item" data-route="/animas">
          <span class="nav-emoji">&#x1F338;</span>
          <i data-lucide="bot" class="nav-lucide"></i>
          <span class="nav-label" data-i18n="nav.animas">Anima Management</span></a></li>
        <li><a href="#/memory" class="nav-item" data-route="/memory">
          <span class="nav-emoji">&#x1F4DA;</span>
          <i data-lucide="brain" class="nav-lucide"></i>
          <span class="nav-label" data-i18n="nav.memory">Memory Browser</span></a></li>
        <li><a href="#/logs" class="nav-item" data-route="/logs">
          <span class="nav-emoji">&#x1F4C4;</span>
          <i data-lucide="file-text" class="nav-lucide"></i>
          <span class="nav-label" data-i18n="nav.logs">Logs</span></a></li>
        <li><a href="#/assets" class="nav-item" data-route="/assets">
          <span class="nav-emoji">&#x1F3A8;</span>
          <i data-lucide="palette" class="nav-lucide"></i>
          <span class="nav-label" data-i18n="nav.assets">Assets</span></a></li>
        <li><a href="#/tool-prompts" class="nav-item" data-route="/tool-prompts">
          <span class="nav-emoji">&#x1F4DD;</span>
          <i data-lucide="pencil-ruler" class="nav-lucide"></i>
          <span class="nav-label" data-i18n="nav.tool_prompts">Prompt Settings</span></a></li>
        <li class="nav-divider"></li>
        <li><a href="/workspace/" class="nav-item nav-external" target="_blank">
          <span class="nav-emoji">&#x1F3AE;</span>
          <i data-lucide="building-2" class="nav-lucide"></i>
          <span class="nav-label" data-i18n="nav.workspace">Workspace</span></a></li>
      </ul>
      <div class="nav-divider"></div>
      <div class="theme-toggle" id="themeToggle">
        <span class="nav-emoji theme-toggle-icon">&#x1F3A8;</span>
        <span class="nav-label">Business</span>
        <label class="theme-switch">
          <input type="checkbox" id="themeSwitch">
          <span class="theme-slider"></span>
        </label>
      </div>
    </nav>

    <!-- Main Content Area -->
    <div class="main-content" id="pageContent">
      <!-- Pages are rendered here by the router -->
    </div>
  </div>

  <script src="/vendor/lucide/lucide.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) lucide.createIcons();
    });
  </script>
  <script type="module" src="/modules/app.js?v=20260228d"></script>
</body>
</html>
